id: custom-xss-reflect
info:
  name: Reflected XSS Detection
  severity: high
  description: Detects reflected cross-site scripting vulnerabilities
  cwe: CWE-79
  tags:
    - xss
    - injection
    - owasp-top10

requests:
  - method: GET
    path: "{{BaseURL}}"
    payloads:
      param_values:
        - "<script>alert(1)</script>"
        - "<img src=x onerror=alert(1)>"
        - "\">'><script>alert(1)</script>"
    matchers:
      - type: word
        words:
          - "<script>alert(1)</script>"
          - "onerror=alert(1)"
        condition: or
