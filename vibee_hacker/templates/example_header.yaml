id: missing-security-headers
info:
  name: Missing Security Headers
  severity: low
  description: Detects missing HTTP security headers that protect against common attacks
  cwe: CWE-693
  tags:
    - headers
    - misconfiguration
    - hardening

requests:
  - method: GET
    path: "{{BaseURL}}"
    matchers:
      - type: regex
        regex:
          - "(?i)x-frame-options|content-security-policy|x-content-type-options"
        condition: or
